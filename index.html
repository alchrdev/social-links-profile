<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./css/styles.css">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  </head>
  <body>
    <article class="scl-pfl" style="color: blue;">
      <header class="scl-pfl-head">
        <img class="scl-pfl-avatar" src="./assets/images/avatar-jessica.jpeg" alt="Avatar of Jessica">
        <h1 class="scl-pfl-name">Jessica Randall</h1>
        <p class="scl-pfl-location">London, United Kingdom</p>
      </header>
      <p class="scl-pfl-desc">"Front-end developer and avid reader."</p>
      <div class="scl-pfl-links">
        <a href="#" class="scl-pfl-link" target="_blank">GitHub</a>
        <a href="#" class="scl-pfl-link" target="_blank">Frontend Mentor</a>
        <a href="#" class="scl-pfl-link" target="_blank">LinkedIn</a>
        <a href="#" class="scl-pfl-link" target="_blank">Twitter</a>
        <a href="#" class="scl-pfl-link" target="_blank">Instagram</a>
      </div>
    </article>
    <div class="attribution">
      Challenge by <a class="attribution-link" href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a class="attribution-link" href="#">Alchr Dev</a>.
    </div>
  </body>
</html>
